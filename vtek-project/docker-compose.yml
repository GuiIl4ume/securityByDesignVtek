services:
  # --- Tier 3 : Data ---
  db:
    image: postgres:17-alpine
    container_name: vtek-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vtek-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Tier 2 : Application (Backend) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vtek-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vtek-network

  # --- Tier 1 : Presentation (Frontend) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vtek-frontend
    ports:
      - "8501:8501"
    environment:
      # Le frontend parle au backend via le nom du service Docker interne 'backend'
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - vtek-network

  # --- ETL (Simulation de l'ingestion) ---
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: vtek-etl
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - vtek-network

networks:
  vtek-network:
    driver: bridge

volumes:
  postgres_data: