services:
  # --- Tier 3 : Data ---
  db:
    image: postgres:17-alpine
    container_name: vtek-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vtek-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- API Gateway (KrakenD) ---
  gateway:
    image: devopsfaith/krakend:2.7
    container_name: vtek-gateway
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
    ports:
      - "8080:8080"
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    depends_on:
      - backend
    networks:
      - vtek-network

  # --- Tier 2 : Application (Backend) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vtek-backend
    # Port 8000 non exposé publiquement : tout le trafic passe par la gateway (port 8080)
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vtek-network

  # --- Tier 1 : Presentation (Frontend) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vtek-frontend
    ports:
      - "8501:8501"
    environment:
      # Le frontend passe par la gateway KrakenD
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - vtek-network

  # --- ETL (Simulation de l'ingestion) ---
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: vtek-etl
    environment:
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - vtek-network

  # --- Tier 0 : Supervision Sécurité ---
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: vtek-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - vtek-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    container_name: vtek-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - vtek-network
    depends_on:
      - prometheus

networks:
  vtek-network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: