global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vtek-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  - job_name: "vtek-gateway"
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: "/__stats"
